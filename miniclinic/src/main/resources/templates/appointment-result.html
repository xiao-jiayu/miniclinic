<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號完成 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; }
        .success { background: #D1FAE5; color: #065F46; padding: 16px; border-radius: 4px; margin: 20px 0; }
        .summary { background: #F8FAFC; padding: 20px; border-left: 5px solid #14B8A6; }
        dt { font-weight: bold; color: #0F2443; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>掛號提交完成</h1>

    <div class="success">
        您的掛號已收到（注意：本週尚未寫入資料庫，下週我們才會真的儲存）
    </div>

    <div class="summary">
        <h2>掛號摘要</h2>
        <dl>
            <dt>掛號編號</dt> <dd th:text="${appointment.apptId}"></dd>
            <dt>病歷號</dt>   <dd th:text="${appointment.patient.chartNo}"></dd>
            <dt>病患姓名</dt> <dd th:text="${appointment.patient.name}"></dd>
            <dt>醫師</dt>     <dd th:text="${appointment.doctor.name}"></dd>
            <dt>科別</dt>     <dd th:text="${appointment.doctor.department}"></dd>
            <dt>日期</dt>     <dd th:text="${appointment.apptDate}"></dd>
            <dt>時段</dt>     <dd th:text="${appointment.timeSlot}"></dd>
            <dt>狀態</dt>     <dd th:text="${appointment.status}"></dd>
        </dl>
    </div>

    <p><a th:href="@{/}">← 回首頁</a></p>
</body>
</html>
