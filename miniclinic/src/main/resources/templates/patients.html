<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>病患清單 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
        tr:hover { background: #F8FAFC; }
        .back { display: inline-block; margin-top: 20px; color: #14B8A6; text-decoration: none; }
    </style>
</head>
<body>
    <h1>病患清單</h1>

    <p th:if="${patients.isEmpty()}">目前沒有病患資料。</p>

    <table th:unless="${patients.isEmpty()}">
        <thead>
            <tr>
                <th>病歷號</th>
                <th>姓名</th>
                <th>性別</th>
                <th>電話</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.chartNo}">C001</td>
                <td th:text="${patient.name}">王小明</td>
                <td th:text="${patient.gender}">男</td>
                <td th:text="${patient.phone}">0912-345678</td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="back">← 返回首頁</a>
</body>
</html>
