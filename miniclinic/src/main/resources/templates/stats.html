<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號統計</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>掛號統計</h1>

    <div class="card mb-3">
        <div class="card-header">總覽</div>
        <div class="card-body">
            <p>醫師總數: <span th:text="${totalDoctors}"></span></p>
            <p>病患總數: <span th:text="${totalPatients}"></span></p>
            <p>掛號總數: <span th:text="${totalAppointments}"></span></p>
        </div>
    </div>

    <div class="card">
        <div class="card-header">依科別分組的掛號數</div>
        <div class="card-body">
            <ul class="list-group">
                <li class="list-group-item" th:each="entry : ${departmentStats}">
                    <span th:text="${entry.key}"></span>: <span th:text="${entry.value}"></span>
                </li>
            </ul>
        </div>
    </div>

    <p class="mt-4"><a href="/" class="btn btn-secondary">回首頁</a></p>
</div>
</body>
</html>
