<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密碼 - MiniClinic</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* 為了範例，這裡提供一些基本的 CSS 樣式 */
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .text-danger { color: #dc3545; font-size: 0.875em; margin-top: 5px; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-right: 10px; }
        .btn-primary { background-color: #007bff; color: white; border: none; }
        .btn-secondary { background-color: #6c757d; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>修改密碼</h1>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form th:action="@{/password}" th:object="${passwordForm}" method="post">
            <div class="form-group">
                <label for="oldPassword">舊密碼:</label>
                <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control" />
                <div class="text-danger" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
            </div>

            <div class="form-group">
                <label for="newPassword">新密碼:</label>
                <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" />
                <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="form-group">
                <label for="confirmNewPassword">確認新密碼:</label>
                <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}" class="form-control" />
                <div class="text-danger" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary">修改密碼</button>
            <a th:href="@{/dashboard}" class="btn btn-secondary">返回儀表板</a>
        </form>
    </div>
</body>
</html>
