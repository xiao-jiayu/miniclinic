<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫師儀表板 - MiniClinic</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* 為了範例，這裡提供一些基本的 CSS 樣式 */
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { margin: 0; }
        .header nav a, .header nav button { margin-left: 10px; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
        .btn { cursor: pointer; }
        .btn-danger { background-color: #dc3545; color: white; border: none; }
        .btn-info { background-color: #17a2b8; color: white; border: none; }
        .btn-warning { background-color: #ffc107; color: #212529; border: none; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .table th { background-color: #f2f2f2; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .status-BOOKED { color: blue; font-weight: bold; }
        .status-COMPLETED { color: green; font-weight: bold; }
        .status-CANCELLED { color: red; font-weight: bold; text-decoration: line-through; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 th:text="|歡迎，${loggedInDoctorName} 醫師！|">歡迎，王醫師！</h1>
            <nav>
                <a th:href="@{/password}" class="btn btn-info">修改密碼</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger">登出</button>
                </form>
            </nav>
        </header>

        <h2>今日掛號：<span th:text="${#temporals.format(today, 'yyyy年MM月dd日')}">2023年10月26日</span></h2>

        <div th:if="${appointments.isEmpty()}" class="alert alert-info">
            今日沒有掛號。
        </div>

        <table th:unless="${appointments.isEmpty()}" class="table">
            <thead>
                <tr>
                    <th>時段</th>
                    <th>病患姓名</th>
                    <th>病歷號</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="appt : ${appointments}">
                    <td th:text="${appt.timeSlot}"></td>
                    <td th:text="${appt.patient.name}"></td>
                    <td th:text="${appt.patient.chartNo}"></td>
                    <td th:class="${'status-' + appt.status}" th:text="${appt.status}"></td>
                    <td>
                        <button th:if="${appt.status == 'BOOKED'}"
                                th:data-id="${appt.apptId}"
                                onclick="cancelAppointment(this)" class="btn btn-warning btn-sm">取消</button>
                        <button th:if="${appt.status == 'BOOKED'}"
                                th:data-id="${appt.apptId}"
                                onclick="completeAppointment(this)" class="btn btn-success btn-sm" style="margin-left: 5px;">完成</button>

                        <!-- 您可以在此處添加其他操作按鈕，例如完成掛號 -->
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function cancelAppointment(button) {
            if (!confirm('確定要取消這筆掛號嗎？')) {
                return;
            }
            const apptId = button.dataset.id;
            fetch(`/api/appointments/${apptId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'CANCELLED' })
            })
            .then(response => {
                if (response.ok) {
                    alert('掛號已取消！');
                    location.reload(); // 重新整理頁面以顯示更新後的狀態
                } else {
                    response.json().then(errorData => {
                        alert('取消失敗: ' + (errorData.message || '未知錯誤'));
                    }).catch(() => {
                        alert('取消失敗: 伺服器錯誤');
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('取消掛號時發生網路錯誤。');
            });
        }

        function completeAppointment(button) {
            if (!confirm('確定要標記此掛號為「完成」嗎？')) {
                return;
            }
            const apptId = button.dataset.id;
            fetch(`/api/appointments/${apptId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'COMPLETED' })
            })
            .then(response => {
                if (response.ok) {
                    alert('掛號已標記為完成！');
                    location.reload(); // 重新整理頁面以顯示更新後的狀態
                } else {
                    response.json().then(errorData => {
                        alert('標記失敗: ' + (errorData.message || '未知錯誤'));
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('標記掛號完成時發生網路錯誤。');
            });
        }
    </script>
</body>
</html>
