spring.application.name=miniclinic
server.port=8080
logging.level.tw.edu.fju.miniclinic=DEBUG

# 確保 data.sql 以 UTF-8 讀取(Windows 預設編碼為 CP950,會造成中文亂碼）
spring.sql.init.encoding=UTF-8

# SQLite 資料庫檔案位置（專案根目錄）
spring.datasource.url=jdbc:sqlite:miniclinic.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate 使用 SQLite 的方言
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# 啟動時自動建立/更新資料表結構
spring.jpa.hibernate.ddl-auto=update

# 讓 Spring Boot 啟動時執行 data.sql
spring.sql.init.mode=always

# 顯示執行的 SQL(開發時很有用)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true